services:
  db:
    image: postgres:17-alpine
    container_name: dashboard_db
    environment:
      POSTGRES_USER: dashboard_user
      POSTGRES_PASSWORD: dashboard123
      POSTGRES_DB: dashboard_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
